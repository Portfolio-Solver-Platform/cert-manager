apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: main
spec:
  acme:
    # Let's Encrypt production API
    server: {{ .Values.issuer.server | quote }}
    email: {{ .Values.issuer.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.issuer.accountKeySecretName }}
    solvers:
    - http01:
        ingress:
          ingressClassName: istio
