apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-cert
  namespace: {{ .Values.gateway.namespace }}
spec:
  secretName: {{ .Values.certificates.auth.secretName }}
  issuerRef:
    name: {{ .Values.issuer.name }}
    kind: ClusterIssuer
  commonName: {{ .Values.certificates.auth.domainName }}
  dnsNames:
  - {{ .Values.certificates.auth.domainName }}
